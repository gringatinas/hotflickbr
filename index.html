<!doctype html>
<html lang="pt-BR">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Acesso ao Conteúdo</title>

<meta name="robots" content="noindex,nofollow">
<meta name="referrer" content="strict-origin-when-cross-origin">

<style>

:root{
--g1:#6f2bd8;
--g2:#3b00c4;
--txt:#ffffff;
}

*{box-sizing:border-box}

html,body{
height:100%;
margin:0;
}

body{

font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;

background:linear-gradient(135deg,#000000 0%,#120014 60%,#2b002f 100%);

display:flex;
align-items:center;
justify-content:center;

color:var(--txt);
padding:24px;
}

.card{

max-width:700px;
width:100%;

padding:35px;

border-radius:14px;

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.05);

box-shadow:0 20px 60px rgba(0,0,0,0.6);

text-align:center;

}

h1{

font-size:24px;

margin-bottom:12px;

background:linear-gradient(90deg,var(--g1),var(--g2));

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

p{

opacity:0.9;

margin-bottom:28px;

font-size:16px;

}

.buttons{

display:flex;
flex-direction:column;
gap:15px;

}

.btn{

display:block;

padding:14px;

border-radius:999px;

background:linear-gradient(90deg,var(--g1),var(--g2));

color:#fff;

text-decoration:none;

font-weight:600;

transition:0.2s;

}

.btn:hover{

transform:scale(1.03);
box-shadow:0 10px 35px rgba(100,0,255,0.35);

}

.btn.secondary{

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.15);

}

.small{

margin-top:18px;

font-size:13px;

opacity:0.65;

}

</style>

</head>

<body>

<div class="card">

<h1>Acesso ao Conteúdo</h1>

<p>
Escolha como deseja acessar o conteúdo abaixo.
</p>

<div class="buttons">

<a class="btn secondary" 
href="https://t.me/baixarendagratis" 
target="_blank">

🔎 Ver Prévias

</a>

<a class="btn" 
href="https://t.me/flixhubot?start=instagram" 
target="_blank">

🚀 Acessar Bot Direto

</a>

</div>

<div class="small">

Dica: veja as prévias antes de acessar o bot.

</div>

</div>

</body>
</html>
