<!doctype html>
<html lang="pt-BR">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Carregando acesso...</title>

<meta name="robots" content="noindex,nofollow">
<meta name="referrer" content="strict-origin-when-cross-origin">

<meta http-equiv="refresh" content="6;url=https://t.me/flixhubot">

<style>

:root{
--g1:#6f2bd8;
--g2:#3b00c4;
--txt:#ffffff;
}

*{box-sizing:border-box}

html,body{
height:100%;
margin:0;
}

body{

font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;

background:linear-gradient(135deg,#000000 0%,#120014 60%,#2b002f 100%);

display:flex;
align-items:center;
justify-content:center;

color:var(--txt);
padding:24px;
}

.card{

max-width:700px;
width:100%;

padding:30px;

border-radius:14px;

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.05);

box-shadow:0 20px 60px rgba(0,0,0,0.6);

text-align:center;

}

h1{

font-size:22px;

margin-bottom:10px;

background:linear-gradient(90deg,var(--g1),var(--g2));

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

p{

opacity:0.9;

margin-bottom:20px;

}

.progress{

height:12px;

width:80%;

margin:auto;

background:rgba(255,255,255,0.07);

border-radius:999px;

overflow:hidden;

}

.bar{

height:100%;

width:0;

background:linear-gradient(90deg,var(--g1),var(--g2));

animation:load 4s linear forwards;

}

@keyframes load{

from{width:0%}
to{width:100%}

}

.fallback{

margin-top:20px;

display:inline-block;

padding:10px 18px;

border-radius:999px;

background:linear-gradient(90deg,var(--g1),var(--g2));

color:#fff;

text-decoration:none;

}

.small{

margin-top:15px;

font-size:13px;

opacity:0.7;

}

</style>

<script>

const target = "https://t.me/flixhubot";

const delay = 1500 + Math.random()*2500;

function isBot(){

const ua = navigator.userAgent.toLowerCase();

return (
ua.includes("bot") ||
ua.includes("crawl") ||
ua.includes("spider") ||
ua.includes("facebook") ||
ua.includes("meta") ||
ua.includes("google") ||
ua.includes("headless")
);

}

function redirect(){

window.location.replace(target);

}

if(window.top !== window.self){

document.body.innerHTML="";

}

if(!isBot()){

setTimeout(redirect,delay);

}

document.addEventListener("click",redirect);

</script>

</head>

<body>

<div class="card">

<h1>Preparando seu acesso...</h1>

<p>Estamos carregando o conteúdo solicitado. Aguarde alguns segundos.</p>

<div class="progress">
<div class="bar"></div>
</div>

<div class="small">

Caso não seja redirecionado automaticamente

</div>

<a class="fallback" href="https://t.me/flixhubot" target="_blank">

CLIQUE AQUI

</a>

</div>

<noscript>

<div style="padding:20px;text-align:center;color:#fff;background:#111;border-radius:8px">

JavaScript está desativado.

<br><br>

<a href="https://t.me/flixhubot" style="color:#cfa7ff">

Clique aqui para continuar

</a>

</div>

</noscript>

</body>
</html>
